services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CREATE_TOPICS: "railguard.alerts,railguard.crowd,railguard.trains,railguard.cameras,railguard.crowd.enriched,railguard.ai.risk"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: railguard
      POSTGRES_PASSWORD: railguard
      POSTGRES_DB: railguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../services/backend
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: railguard.alerts
      KAFKA_CROWD_TOPIC: railguard.crowd
      KAFKA_TRAIN_TOPIC: railguard.trains
      KAFKA_AI_RISK_TOPIC: railguard.ai.risk
      POSTGRES_DSN: postgresql://railguard:railguard@postgres:5432/railguard
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"

  simulator:
    build:
      context: ../services/ingestion/simulator
      dockerfile: Dockerfile
    depends_on:
      - kafka
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: railguard.alerts
      KAFKA_CROWD_TOPIC: railguard.crowd
      KAFKA_TRAIN_TOPIC: railguard.trains
      KAFKA_CAMERA_TOPIC: railguard.cameras
      EVENT_INTERVAL_SECONDS: 1

  yolo-service:
    build:
      context: ../services/ml/yolo_service
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CAMERA_TOPIC: railguard.cameras
      KAFKA_CROWD_ENRICHED_TOPIC: railguard.crowd.enriched
      YOLO_MODEL: yolov8n.pt
      PERSON_CONF_THRESHOLD: "0.45"
    volumes:
      - ./models:/models

  ai-worker:
    build:
      context: ../services/ml/ai_worker
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ALERT_TOPIC: railguard.alerts
      CROWD_TOPIC: railguard.crowd.enriched
      TRAIN_TOPIC: railguard.trains
      AI_RISK_TOPIC: railguard.ai.risk
      TICK_SECONDS: "5"

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws/alerts
      VITE_WS_AI_RISK_URL: ws://localhost:8000/ws/ai-risk
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  models:
